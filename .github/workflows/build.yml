name: Build BlueZ Backport

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build package
        run: docker build -t bluez-backport .

      - name: Extract debs
        run: |
          docker create --name bluez-build bluez-backport
          mkdir -p output
          docker cp bluez-build:/output/. output/
          docker rm bluez-build

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: output/*.deb
